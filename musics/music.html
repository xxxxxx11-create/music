
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no">
  <title>纯黑音乐 · 滚轮滑动</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* 页面容器 - 使用自定义滚动条 */
    .pages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #333 #000;
    }

    .pages::-webkit-scrollbar {
      width: 6px;
      background: transparent;
    }

    .pages::-webkit-scrollbar-track {
      background: #000;
      border-radius: 3px;
      margin: 4px 0;
    }

    .pages::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
      transition: background 0.2s;
      min-height: 40px;
    }

    .pages::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .pages::-webkit-scrollbar-thumb:active {
      background: #777;
    }

    .pages::-webkit-scrollbar-corner {
      background: transparent;
    }

    .page {
      display: none;
      min-height: 100%;
      padding: 16px 16px 100px 16px;
    }

    .page.active {
      display: block;
    }

    /* 搜索栏样式 - 纯黑风格 */
    .search-container {
      margin-bottom: 16px;
      position: relative;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      background: #0a0a0a;
      border-radius: 24px;
      padding: 10px 16px;
      border: 1px solid #1a1a1a;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input-wrapper:focus-within {
      border-color: #333;
      background: #111;
    }

    .search-icon {
      width: 18px;
      height: 18px;
      fill: #555;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .search-input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      caret-color: #fff;
    }

    .search-input::placeholder {
      color: #555;
      font-weight: 400;
    }

    .clear-search-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .clear-search-btn:hover {
      background: #1a1a1a;
      color: #fff;
    }

    .clear-search-btn.visible {
      display: flex;
    }

    /* 搜索推荐/下拉提示 */
    .search-suggestions {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 8px 0;
      z-index: 30;
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
      max-height: 260px;
      overflow-y: auto;
    }

    .search-suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
      color: #ccc;
      font-size: 0.9rem;
    }

    .suggestion-item:hover, .suggestion-item.highlighted {
      background: #1a1a1a;
      color: #fff;
    }

    .suggestion-icon {
      width: 16px;
      height: 16px;
      fill: #666;
      flex-shrink: 0;
    }

    .suggestion-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      padding: 16px;
      text-align: center;
      color: #666;
      font-size: 0.85rem;
    }

    .song-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 底部导航 */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: #000;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: #666;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      transition: color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .nav-item.active {
      color: #fff;
      background: #1a1a1a;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0);
      animation: ripple-anim 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .song-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #0a0a0a;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .song-card:active {
      transform: scale(0.98);
      background: #1a1a1a;
    }

    .song-card .thumb {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #1a1a1a;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .song-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) brightness(0.7);
    }

    .song-card .thumb svg {
      width: 24px;
      height: 24px;
      fill: #555;
    }

    .song-info {
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-size: 1rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }

    .song-artist {
      font-size: 0.8rem;
      color: #777;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      font-size: 0.65rem;
      padding: 2px 6px;
      background: #1a1a1a;
      border-radius: 8px;
      color: #999;
    }

    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 8px;
    }

    .playlist-square {
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .playlist-square:active {
      transform: scale(0.96);
      background: #1a1a1a;
    }

    .playlist-square .genre-name {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .playlist-square .song-count {
      font-size: 0.75rem;
      color: #777;
    }

    .playlist-square .icon {
      width: 32px;
      height: 32px;
      fill: #555;
      margin-bottom: 8px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 12px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: #ccc; }

    .profile-placeholder {
      text-align: center;
      padding-top: 60px;
      color: #777;
    }

    .login-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .login-btn:active { transform: scale(0.95); }

    .player-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .player-overlay.open {
      transform: translateY(0);
    }

    .player-overlay .close-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 2;
    }

    .player-overlay .close-btn:hover { background: #1a1a1a; }

    .player-cover {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
      transition: box-shadow 0.3s;
    }

    .player-cover.playing {
      animation: spin 12s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .player-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      filter: grayscale(100%) brightness(0.7);
    }

    .player-cover svg {
      width: 64px;
      height: 64px;
      fill: #fff;
      opacity: 0.6;
    }

    .player-info {
      text-align: center;
      width: 100%;
    }

    .player-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-artist {
      font-size: 0.9rem;
      color: #777;
    }

    .player-tags {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .progress-container {
      width: 100%;
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 0.75rem;
      color: #555;
      min-width: 36px;
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      overflow: visible;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      position: relative;
      transition: width 0.1s linear;
    }

    .progress-thumb {
      position: absolute;
      right: -8px;
      top: -6px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,0.3);
      transform: scale(0);
      transition: transform 0.15s;
    }

    .progress-bar:hover .progress-thumb,
    .progress-bar.dragging .progress-thumb {
      transform: scale(1);
    }

    .progress-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: translate(-50%, -50%) scale(0);
      animation: progress-ripple-anim 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes progress-ripple-anim {
      to {
        transform: translate(-50%, -50%) scale(3);
        opacity: 0;
      }
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
      padding: 0;
    }

    .ctrl-btn:hover { background: #1a1a1a; }
    .ctrl-btn:active { transform: scale(0.92); }

    .ctrl-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255,255,255,0.1);
      transition: transform 0.15s, box-shadow 0.2s;
      padding: 0;
    }

    .play-btn:hover { box-shadow: 0 0 20px rgba(255,255,255,0.25); }
    .play-btn:active { transform: scale(0.92); }

    .play-btn svg {
      width: 24px;
      height: 24px;
      fill: #000;
    }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
  </style>
</head>

         artist: "无",

         cover: "【PLAYLIST】_雨夜咖啡馆氛围感爵士音乐_雨天氛围混响_居家_学习_阅读_放松_工作_睡前音乐.jpeg",

      function generatePlaylists() {
        const genreMap = new Map();
        songs.forEach(song => {
          song.tags.forEach(tag => {
            if (!genreMap.has(tag)) genreMap.set(tag, []);
            genreMap.get(tag).push(song);
          });
        });
        const playlists = [];
        genreMap.forEach((songsList, genre) => {
          playlists.push({ genre, songs: songsList, count: songsList.length });
        });
        return playlists;
      }

      let playlists = generatePlaylists();
      const audio = new Audio();
      let currentPlaylist = songs;
      let currentIndex = 0;
      let isPlaying = false;
      let isLoop = false;
      let isShuffle = false;
      let currentViewPlaylist = null;

      const songsPage = document.getElementById('songs-page');
      const playlistsPage = document.getElementById('playlists-page');
      const profilePage = document.getElementById('profile-page');
      const songListContainer = document.getElementById('song-list');
      const playlistGridContainer = document.getElementById('playlist-grid');
      const playlistDetailDiv = document.getElementById('playlist-detail');
      const playlistSongsContainer = document.getElementById('playlist-songs');
      const playlistBackBtn = document.getElementById('playlist-back-btn');

      const playerOverlay = document.getElementById('player-overlay');
      const closePlayerBtn = document.getElementById('close-player-btn');
      const playerCover = document.getElementById('player-cover');
      const playerCoverImg = document.getElementById('player-cover-img');
      const playerDefaultIcon = document.getElementById('player-default-icon');
      const playerTitle = document.getElementById('player-title');
      const playerArtist = document.getElementById('player-artist');
      const playerTagsDiv = document.getElementById('player-tags');
      const progressBar = document.getElementById('progress-bar');
      const progressFill = document.getElementById('progress-fill');
      const progressThumb = document.getElementById('progress-thumb');
      const playerCurrentTime = document.getElementById('player-current-time');
      const playerDuration = document.getElementById('player-duration');
      const playBtn = document.getElementById('play-btn');
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const navItems = document.querySelectorAll('.nav-item');

      const searchInput = document.getElementById('search-input');
      const clearSearchBtn = document.getElementById('clear-search-btn');
      const searchSuggestions = document.getElementById('search-suggestions');

      function formatTime(sec) {
        if (isNaN(sec) || !isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      function createRipple(event, element, color = 'rgba(255,255,255,0.15)') {
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const rect = element.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${event.clientX - rect.left - size / 2}px`;
        ripple.style.top = `${event.clientY - rect.top - size / 2}px`;
        ripple.style.background = color;
        element.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      }

      function addRippleToCards() {
        document.querySelectorAll('.song-card, .playlist-square, .nav-item, .ctrl-btn, .play-btn, .close-btn, .login-btn, .back-btn, .suggestion-item').forEach(el => {
          if (!el.hasRippleListener) {
            el.addEventListener('pointerdown', (e) => createRipple(e, el));
            el.hasRippleListener = true;
          }
        });
      }

      function updatePlayIcon() {
        playIcon.style.display = isPlaying ? 'none' : 'block';
        pauseIcon.style.display = isPlaying ? 'block' : 'none';
      }

      function updateCoverAnimation() {
        playerCover.classList.toggle('playing', isPlaying);
      }

      function loadPlayerSong(song) {
        if (!song) return;
        playerTitle.textContent = song.title;
        playerArtist.textContent = song.artist;
        if (song.cover) {
          playerCoverImg.src = song.cover;
          playerCoverImg.style.display = 'block';
          playerDefaultIcon.style.display = 'none';
        } else {
          playerCoverImg.style.display = 'none';
          playerDefaultIcon.style.display = 'block';
        }
        playerTagsDiv.innerHTML = song.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        progressFill.style.width = '0%';
        progressThumb.style.left = '0%';
        playerCurrentTime.textContent = '0:00';
        playerDuration.textContent = '0:00';
        audio.src = song.src;
        if (isPlaying) audio.play().catch(e => console.warn('自动播放失败:', e));
      }

      function playCurrentSong() {
        const song = currentPlaylist[currentIndex];
        if (!song) return;
        loadPlayerSong(song);
        audio.play().then(() => {
          isPlaying = true;
          updatePlayIcon();
          updateCoverAnimation();
        }).catch(err => console.warn('播放失败:', err));
      }

      function pauseAudio() {
        audio.pause();
        isPlaying = false;
        updatePlayIcon();
        updateCoverAnimation();
      }

      function togglePlay() {
        if (!audio.src && currentPlaylist.length > 0) {
          playCurrentSong();
          return;
        }
        if (isPlaying) pauseAudio();
        else audio.play().then(() => { isPlaying = true; updatePlayIcon(); updateCoverAnimation(); }).catch(() => {});
      }

      function prevSong() {
        if (currentPlaylist.length === 0) return;
        currentIndex = isShuffle ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        playCurrentSong();
      }

      function nextSong() {
        if (currentPlaylist.length === 0) return;
        currentIndex = isShuffle ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex + 1) % currentPlaylist.length;
        playCurrentSong();
      }

      function openPlayer(song, playlist = songs, index = 0) {
        currentPlaylist = playlist;
        currentIndex = index;
        loadPlayerSong(song);
        if (isPlaying) audio.play().catch(() => {});
        playerOverlay.classList.add('open');
      }

      function closePlayer() {
        playerOverlay.classList.remove('open');
      }

      audio.addEventListener('loadedmetadata', () => { playerDuration.textContent = formatTime(audio.duration); });
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = `${percent}%`;
          progressThumb.style.left = `${percent}%`;
          playerCurrentTime.textContent = formatTime(audio.currentTime);
        }
      });
      audio.addEventListener('ended', () => { if (isLoop) { audio.currentTime = 0; audio.play(); } else nextSong(); });
      audio.addEventListener('play', () => { isPlaying = true; updatePlayIcon(); updateCoverAnimation(); });
      audio.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); updateCoverAnimation(); });
      audio.addEventListener('error', () => { console.warn('音频加载失败'); nextSong(); });

      function seekTo(percent) { if (audio.duration) audio.currentTime = (percent / 100) * audio.duration; }

      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = ((e.clientX - rect.left) / rect.width) * 100;
        seekTo(percent);
      });

      let isDragging = false;
      function startDrag(e) { isDragging = true; progressBar.classList.add('dragging'); updateDrag(e); }
      function stopDrag() { isDragging = false; progressBar.classList.remove('dragging'); }
      function updateDrag(e) {
        if (!isDragging) return;
        const rect = progressBar.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let percent = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
        seekTo(percent);
      }
      progressBar.addEventListener('mousedown', startDrag);
      progressBar.addEventListener('touchstart', startDrag, { passive: false });
      window.addEventListener('mousemove', updateDrag);
      window.addEventListener('touchmove', updateDrag, { passive: false });
      window.addEventListener('mouseup', stopDrag);
      window.addEventListener('touchend', stopDrag);

      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', prevSong);
      nextBtn.addEventListener('click', nextSong);
      closePlayerBtn.addEventListener('click', closePlayer);

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowLeft') { e.preventDefault(); prevSong(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); nextSong(); }
      });

      function renderSongList(container, songArray, playlist = songArray) {
        container.innerHTML = '';
        if (songArray.length === 0) {
          container.innerHTML = '<div class="no-results" style="padding:20px;color:#666;">没有找到相关歌曲</div>';
          return;
        }
        songArray.forEach((song, idx) => {
          const card = document.createElement('div');
          card.className = 'song-card';
          card.innerHTML = `
            <div class="thumb">
              ${song.cover ? `<img src="${song.cover}" alt="">` : `<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`}
            </div>
            <div class="song-info">
              <div class="song-title">${song.title}</div>
              <div class="song-artist">${song.artist}</div>
              <div class="song-tags">${song.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </div>
          `;
          card.addEventListener('click', (e) => {
            createRipple(e, card);
            openPlayer(song, playlist, idx);
            if (!isPlaying) togglePlay();
          });
          container.appendChild(card);
        });
      }

      function renderPlaylistGrid() {
        playlistGridContainer.innerHTML = '';
        playlists.forEach(pl => {
          const square = document.createElement('div');
          square.className = 'playlist-square';
          square.innerHTML = `
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            <div class="genre-name">${pl.genre}</div>
            <div class="song-count">${pl.count} 首</div>
          `;
          square.addEventListener('click', (e) => { createRipple(e, square); showPlaylistDetail(pl); });
          playlistGridContainer.appendChild(square);
        });
      }

      function showPlaylistDetail(playlist) {
        currentViewPlaylist = playlist;
        playlistDetailDiv.classList.remove('hidden');
        playlistGridContainer.parentElement.style.display = 'none';
        renderSongList(playlistSongsContainer, playlist.songs, playlist.songs);
      }

      function hidePlaylistDetail() {
        playlistDetailDiv.classList.add('hidden');
        playlistGridContainer.parentElement.style.display = 'block';
        currentViewPlaylist = null;
      }

      playlistBackBtn.addEventListener('click', hidePlaylistDetail);

      function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        navItems.forEach(item => item.classList.toggle('active', item.dataset.page === pageId));
        if (pageId === 'playlists-page') hidePlaylistDetail();
      }

      navItems.forEach(item => item.addEventListener('click', (e) => { createRipple(e, item); switchPage(item.dataset.page); }));

      // ---------- 搜索功能实现 ----------
      function performSearch(query) {
        const term = query.toLowerCase().trim();
        if (!term) return songs; // 空搜索返回全部
        return songs.filter(song => {
          return song.title.toLowerCase().includes(term) ||
                 song.artist.toLowerCase().includes(term) ||
                 song.tags.some(tag => tag.toLowerCase().includes(term));
        });
      }

      function getSearchSuggestions(query) {
        const term = query.toLowerCase().trim();
        if (!term) return [];
        const suggestions = new Set();
        // 标题匹配建议
        songs.forEach(song => {
          if (song.title.toLowerCase().includes(term)) {
            suggestions.add(song.title.substring(0, 28));
          }
        });
        // 标签匹配建议
        songs.forEach(song => {
          song.tags.forEach(tag => {
            if (tag.toLowerCase().includes(term)) suggestions.add(tag);
          });
        });
        return Array.from(suggestions).slice(0, 6);
      }

      function renderSuggestions(suggestions) {
        searchSuggestions.innerHTML = '';
        if (!searchInput.value.trim()) {
          searchSuggestions.classList.remove('active');
          return;
        }
        if (suggestions.length === 0) {
          searchSuggestions.innerHTML = '<div class="no-results">无匹配建议</div>';
        } else {
          suggestions.forEach(text => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.innerHTML = `
              <svg class="suggestion-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
              <span class="suggestion-text">${text}</span>
            `;
            item.addEventListener('click', (e) => {
              createRipple(e, item);
              searchInput.value = text;
              handleSearchInput(text);
              searchSuggestions.classList.remove('active');
            });
            searchSuggestions.appendChild(item);
          });
        }
        searchSuggestions.classList.add('active');
        addRippleToCards();
      }

      function handleSearchInput(value) {
        const term = value || searchInput.value;
        const filtered = performSearch(term);
        renderSongList(songListContainer, filtered, filtered);
        // 更新建议
        const suggestions = getSearchSuggestions(term);
        renderSuggestions(suggestions);
        // 控制清除按钮
        if (term.trim()) clearSearchBtn.classList.add('visible');
        else clearSearchBtn.classList.remove('visible');
      }

      searchInput.addEventListener('input', (e) => {
        handleSearchInput(e.target.value);
      });

      searchInput.addEventListener('focus', () => {
        if (searchInput.value.trim()) {
          const suggestions = getSearchSuggestions(searchInput.value);
          renderSuggestions(suggestions);
        }
      });

      clearSearchBtn.addEventListener('click', () => {
        searchInput.value = '';
        handleSearchInput('');
        searchSuggestions.classList.remove('active');
        clearSearchBtn.classList.remove('visible');
        searchInput.focus();
      });

      // 点击外部关闭建议
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
          searchSuggestions.classList.remove('active');
        }
      });

      function init() {
        renderSongList(songListContainer, songs, songs);
        renderPlaylistGrid();
        addRippleToCards();
        if (songs.length > 0) loadPlayerSong(songs[0]);
        updatePlayIcon();
        clearSearchBtn.classList.remove('visible');
      }

      init();

      const observer = new MutationObserver(() => addRippleToCards());
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
